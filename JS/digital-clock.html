<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
</head>

<body>
    <style>
        body {
            background: #0a0a14;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            transition: all 2s ease;
        }

        #clock {
            font-size: clamp(3rem, 12vw, 7rem);
            font-weight: 700;
            color: #00ff88;
            letter-spacing: 8px;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        }

        #ampm {
            font-size: 1.5rem;
            color: #555;
            margin-top: 8px;
        }

        #dateStr {
            color: #444;
            margin-top: 12px;
        }

        .bar {
            width: 300px;
            height: 4px;
            background: #1a1a2e;
            border-radius: 999px;
            margin-top: 24px;
            overflow: hidden;
        }

        #secBar {
            height: 100%;
            background: #00ff88;
            transition: width 0.5s;
        }
    </style>

    <div id="clock">00:00:00</div>
    <div id="ampm">AM</div>
    <div id="dateStr"></div>
    <div class="bar">
        <div id="secBar"></div>
    </div>

    <script>
  function updateClock() {
    let now = new Date();
    let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
    let ampm = h >= 12 ? "PM" : "AM";
    let h12  = h % 12 || 12;
    
    // TODO 1: #clock update karo — padStart(2,"0") use karo
    const timeStr = `${String(h12).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    document.getElementById('clock').innerText = timeStr;
    
    // TODO 2: #ampm update karo
     document.getElementById('ampm').innerText = ampm;
    
    // TODO 3: #dateStr = now.toDateString()
    document.getElementById('dateStr').innerText = now.toDateString();
    
    // TODO 4: #secBar width = (s/59)*100 + "%"
    document.getElementById("secBar").style.width = (s / 59) * 100 + "%";

    
    // BONUS: body background — h ke hisaab se badle (subah/dopahar/shaam/raat)
        
    // if (h >= 5 && h < 12) {
    //         bodyColor = "#FFEFD5"; 
    //     } else if (h >= 12 && h < 18) {
    //         bodyColor = "#ADD8E6"; 
    //     } else if (h >= 18 && h < 22) {
    //         bodyColor = "#4B0082";
    //     } else {
    //         bodyColor = "#191970"; 
    //     }
        document.body.style.backgroundColor = bodyColor;
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>

</html>
