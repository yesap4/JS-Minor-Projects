<!DOCTYPE html>
<html>
<head>
    <title>Char Counter</title>
  <style>
    body { background: #0f0f1a; display: flex; justify-content: center; padding: 60px 20px; }
    .box { width: 500px; }
    h2 { color: white; margin-bottom: 16px; font-family: sans-serif; }
    #myTextarea {
      width: 100%;
      height: 140px;
      background: #1a1a2e;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 14px;
      color: white;
      font-size: 1rem;
      resize: none;
      outline: none;
      transition: border-color 0.3s;
    }
    #counter {
      text-align: right;
      margin-top: 8px;
      font-family: monospace;
      font-size: 0.9rem;
      color: #666;
      transition: color 0.3s;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>✍️ Kuch Likho!</h2>
    <textarea id="myTextarea" placeholder="Yahan type karo..." maxlength="160"></textarea>
    <div id="counter">0 / 150</div>
  </div>

  <script>
    const textarea = document.getElementById("myTextarea");
    const counter  = document.getElementById("counter");
    const MAX = 150;

    // "input" event — har keystroke pe fire hota hai
    textarea.addEventListener("input", function() {

      // kitne characters type hue?
      let count = textarea.value.length;

      // TODO: counter ka text update karo template literal se
      // counter.textContent = ...
        document.getElementById('counter').innerHTML = `${count} / ${MAX}`;
      // TODO: if/else se colors change karo
        if (count < 120) {
            counter.style.color = 'gray';
            textarea.style.borderColor = '#333';
        }
        else if (count < 150) {
            counter.style.color = '#ff8c00';
            textarea.style.borderColor = 'orange';
        }
        else {
            counter.style.color = 'ff4444';
            textarea.style.borderColor = 'red';
        }

      // 0-119: counter gray (#666), border normal (#333)
      // 120-149: counter orange (#ff8c00), border orange
      // 150+: counter red (#ff4444), border red

    });
  </script>
</body>
</html>
